name: 持续集成

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts-backend:
    name: 契约与后端
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 安装后端依赖
        working-directory: backend
        run: npm install --no-audit --no-fund

      - name: 校验共享契约
        run: npm run validate:contracts

      - name: 验证跨端加密向量
        run: npm run test:crypto

      - name: 运行后端测试
        run: npm --prefix backend test

      - name: 检查后端类型
        run: npm --prefix backend run typecheck

  macos:
    name: macOS 原生测试
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 显示 Swift 版本
        run: swift --version

      - name: 运行 Swift 测试
        run: swift test --package-path macos

  android:
    name: Android 原生测试
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 测试、构建并检查 Android 应用
        working-directory: android
        run: ./gradlew testDebugUnitTest assembleDebug lintDebug

      - name: 保存 Android Lint 报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  android-sqlite-instrumentation:
    name: Android 真实 SQLite instrumentation 测试
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4

      - name: 允许当前用户访问 KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: 在托管 Android 模拟器运行 SQLite instrumentation 测试
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          profile: pixel_6
          disable-animations: true
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
            -camera-back none -camera-front none
          script: cd android && ./gradlew connectedDebugAndroidTest

      - name: 保存 instrumentation 测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumentation-report
          path: android/app/build/reports/androidTests/connected/
          if-no-files-found: ignore
