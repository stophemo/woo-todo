name: woo_todo
description: 无我待办 - 跨平台移动端 (Android · HarmonyOS · iOS)
version: 1.0.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.0
  provider: ^6.1.0
  web_socket_channel: ^2.4.0
  http: ^1.1.0
  uuid: ^4.2.0
  intl: ^0.19.0
  flutter_slidable: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: PingFang
      fonts:
        - asset: fonts/PingFangSC-Regular.ttf
        - asset: fonts/PingFangSC-Medium.ttf
          weight: 500
